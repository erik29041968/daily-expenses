<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000') no-repeat center center fixed; background-size: cover; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white/90 p-6 rounded-2xl shadow-xl backdrop-blur-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Our Expenses</h1>
        
        <input id="desc" class="w-full p-2 border rounded mb-2" placeholder="Description">
        <input id="amt" type="number" class="w-full p-2 border rounded mb-2" placeholder="Amount">
        <button onclick="addExpense()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Add Expense</button>

        <div id="list" class="mt-6 space-y-2"></div>
    </div>

    <script>
        const SCRIPT_URL = "YOUR_WEB_APP_URL"; // PASTE URL HERE

        async function addExpense() {
            const data = {
                action: 'add',
                id: Date.now().toString(),
                date: new Date().toLocaleDateString(),
                description: document.getElementById('desc').value,
                amount: document.getElementById('amt').value,
                who: 'Erik'
            };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }
        
        // Add delete and fetch logic here (omitted for brevity, will provide if you want full code)
    </script>
</body>
</html>
