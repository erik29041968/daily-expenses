<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expenses</title>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: sans-serif;
            background: #0077be url('ocean.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .container { 
            max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.9);
            padding: 20px; border-radius: 15px; 
        }
        /* Grote knoppen en inputs voor mobiel */
        input, select, button { 
            width: 100%; padding: 15px; margin: 10px 0; 
            font-size: 18px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;
        }
        button { background: #0077be; color: white; border: none; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 15px; border-bottom: 1px solid #ccc; font-size: 16px; }
        .btns { display: flex; gap: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses</h2>
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <input type="number" id="amount" placeholder="Amount" required>
        <button type="submit">SAVE</button>
    </form>
    <table><tbody id="body"></tbody></table>
</div>
<script>
    const URL = "PLAK_HIER_JE_DEPLOYED_URL"; // Check of dit de URL is van je LAATSTE deployment!

    async function sendRequest(payload) {
        await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    // Ophalen
    fetch(URL).then(r => r.json()).then(data => {
        const tbody = document.getElementById('body');
        data.forEach((row, i) => {
            tbody.innerHTML += `<tr>
                <td>${row.date}<br><b>${row.paidBy}</b>: $${row.amount}</td>
                <td class="btns">
                    <button onclick="editRow(${i+2}, '${row.date}', '${row.paidBy}', ${row.amount})">✏️</button>
                    <button onclick="sendRequest({action:'delete', index:${i+2}})">🗑️</button>
                </td>
            </tr>`;
        });
    });

    function editRow(idx, d, w, a) {
        const date = prompt("Date:", d);
        const who = prompt("Who:", w);
        const amt = prompt("Amount:", a);
        if(date) sendRequest({action:'edit', index:idx, date:date, paidBy:who, amount:amt});
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        sendRequest({date: document.getElementById('date').value, paidBy: document.getElementById('paidBy').value, amount: document.getElementById('amount').value});
    };
</script>
</body>
</html>
