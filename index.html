<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; 
            background: #f4f7f6; /* Rustige, professionele achtergrond */
            min-height: 100vh;
            color: #333;
        }
        .container { 
            max-width: 600px; margin: 0 auto; 
            background: #ffffff; 
            padding: 2rem; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: #004a6e; margin-bottom: 20px; }
        
        /* Stats Styling */
        .stats-grid { display: flex; gap: 10px; margin-bottom: 25px; }
        .stat-box { flex: 1; padding: 15px; border-radius: 10px; text-align: center; background: #eef7fa; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: #004a6e; margin-top: 5px; }

        /* Form Styling */
        label { font-weight: 600; display: block; margin-top: 15px; font-size: 0.9rem; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .edit-btn { background: #f39c12; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Daily Expenses</h2>
    
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Balance<span id="balance" class="stat-val">$0.00</span></div>
    </div>
    
    <form id="expenseForm">
        <input type="hidden" id="editIndex" value="">
        <label>Date</label> <input type="date" id="date" required>
        <label>Who Paid?</label>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <label>Amount ($)</label> <input type="number" id="amount" step="0.01" required>
        <label>Category</label>
        <select id="category">
            <option value="Groceries">Groceries</option><option value="Restaurant">Restaurant</option>
            <option value="Fuel">Fuel</option><option value="Gifts">Gifts</option>
        </select>
        <button type="submit" id="submitBtn">Save Expense</button>
        <button type="button" id="cancelBtn" style="display:none; background:#999;" onclick="resetForm()">Cancel</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>$</th><th>Action</th></tr></thead>
        <tbody id="expenseTableBody">
            </tbody>
    </table>
</div>

<script>
    // Voorbeeld data: Zodra je je data ophaalt uit Google Sheets, zet je die in deze array
    let expenses = [
        { date: '2026-04-25', paidBy: 'Erik', amount: 50.00, category: 'Groceries' }
    ];

    function renderTable() {
        const tbody = document.getElementById('expenseTableBody');
        tbody.innerHTML = ''; // Leeg maken
        expenses.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.paidBy}</td>
                    <td>$${item.amount.toFixed(2)}</td>
                    <td><button class="edit-btn" onclick="editExpense(${index})">Edit</button></td>
                </tr>
            `;
        });
    }

    function editExpense(index) {
        const item = expenses[index];
        document.getElementById('date').value = item.date;
        document.getElementById('paidBy').value = item.paidBy;
        document.getElementById('amount').value = item.amount;
        document.getElementById('category').value = item.category;
        document.getElementById('editIndex').value = index;
        document.getElementById('submitBtn').textContent = "Update Expense";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function resetForm() {
        document.getElementById('expenseForm').reset();
        document.getElementById('editIndex').value = "";
        document.getElementById('submitBtn').textContent = "Save Expense";
        document.getElementById('cancelBtn').style.display = "none";
    }

    // Initial render
    renderTable();
</script>
</body>
</html>
