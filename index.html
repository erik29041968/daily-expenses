<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild Ocean Expenses</title>
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0077be url('ocean.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        .container { 
            width: 90%; max-width: 600px; margin: 20px auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 20px;
        }
        input, select { 
            width: 100%; padding: 20px; margin: 10px 0; 
            font-size: 18px; /* Grotere tekst */
            border: 2px solid #0077be; border-radius: 10px;
        }
        button { 
            width: 100%; padding: 20px; font-size: 18px;
            background: #0077be; color: white; border: none; border-radius: 10px;
        }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #ddd; font-size: 18px; }
        .action-btn { font-size: 24px; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>🌊 Expenses</h2>
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <input type="number" id="amount" placeholder="Bedrag" required>
        <button type="submit">Save</button>
    </form>
    <table><tbody id="body"></tbody></table>
</div>

<script>
    const URL = "PLAK_HIER_JE_DEPLOYMENT_URL";

    function deleteRow(index) {
        fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: index }) })
        .then(() => location.reload());
    }

    function editRow(index, d, w, a) {
        const date = prompt("Datum:", d);
        const paidBy = prompt("Wie:", w);
        const amount = prompt("Bedrag:", a);
        if(date) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'edit', index: index, date: date, paidBy: paidBy, amount: amount }) })
            .then(() => location.reload());
        }
    }

    fetch(URL).then(r => r.json()).then(data => {
        const tbody = document.getElementById('body');
        data.forEach((row, i) => {
            tbody.innerHTML += `<tr><td>${row.date}</td><td>${row.paidBy}</td><td>$${row.amount}</td>
            <td><button class="action-btn" onclick="editRow(${i+2},'${row.date}','${row.paidBy}',${row.amount})">✏️</button>
            <button class="action-btn" onclick="deleteRow(${i+2})">🗑️</button></td></tr>`;
        });
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { method: 'POST', body: JSON.stringify({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        })}).then(() => location.reload());
    };
</script>
</body>
</html>
