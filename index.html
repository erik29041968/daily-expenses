<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Daily Expenses</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 15px; }
        form { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #eee; }
        button { cursor: pointer; padding: 5px 10px; }
        .delete-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Daily Expenses</h2>

    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <select id="category"><option>Groceries</option><option>Coffee</option><option>Fuel</option><option>Other</option></select>
        <input type="number" id="amount" placeholder="Bedrag" step="0.01" required>
        <button type="submit">Toevoegen</button>
    </form>

    <table>
        <thead>
            <tr><th>Datum</th><th>Categorie</th><th>Wie</th><th>Bedrag</th><th>Actie</th></tr>
        </thead>
        <tbody id="body"></tbody>
    </table>

    <script>
        // PLAATS HIER JE EIGEN URL
        const URL = "PLAK_HIER_JE_DEPLOYMENT_URL";

        function refresh() {
            fetch(URL)
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('body');
                    tbody.innerHTML = "";
                    data.forEach((row, i) => {
                        let shortDate = row.date.split('T')[0];
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${shortDate}</td>
                            <td>${row.category}</td>
                            <td>${row.paidBy}</td>
                            <td>$${row.amount}</td>
                            <td><button class="delete-btn" onclick="del(${i+2})">Verwijder</button></td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        async function del(idx) {
            if(!confirm("Zeker weten?")) return;
            await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: idx }) });
            refresh();
        }

        document.getElementById('expenseForm').onsubmit = (e) => {
            e.preventDefault();
            fetch(URL, { method: 'POST', body: JSON.stringify({
                date: document.getElementById('date').value,
                paidBy: document.getElementById('paidBy').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            })}).then(() => { refresh(); document.getElementById('expenseForm').reset(); });
        };

        refresh();
    </script>
</body>
</html>
