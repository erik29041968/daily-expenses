<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses</title>
    <style>
        body { font-family: sans-serif; background: #0077be; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        input, select, button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses</h2>
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <select id="category">
            <option>Groceries</option><option>Coffee</option><option>Fuel</option><option>Other</option>
        </select>
        <input type="number" id="amount" placeholder="Amount" required>
        <button type="submit">SAVE</button>
    </form>
    <table><tbody id="body"></tbody></table>
</div>

<script>
    const URL = "PLAK_HIER_JE_DEPLOYMENT_URL"; // Check deze URL nogmaals!

    async function sendData(payload) {
        await fetch(URL, { method: 'POST', body: JSON.stringify(payload) });
        location.reload();
    }

    fetch(URL).then(r => r.json()).then(data => {
        const tbody = document.getElementById('body');
        data.forEach((row, i) => {
            tbody.innerHTML += `<tr>
                <td>${row.date}<br><b>${row.category}</b> (${row.paidBy})</td>
                <td>$${row.amount}</td>
                <td>
                    <button onclick="editRow(${i+2},'${row.date}','${row.paidBy}','${row.category}',${row.amount})">✏️</button>
                    <button onclick="sendData({action:'delete', index:${i+2}})">🗑️</button>
                </td>
            </tr>`;
        });
    });

    function editRow(i, d, w, c, a) {
        const date = prompt("Date:", d);
        const who = prompt("Who:", w);
        const cat = prompt("Category:", c);
        const amt = prompt("Amount:", a);
        if(date) sendData({action:'edit', index:i, date, paidBy:who, category:cat, amount:amt});
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        sendData({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            category: document.getElementById('category').value,
            amount: document.getElementById('amount').value
        });
    };
</script>
</body>
</html>
