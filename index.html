<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Ocean Expenses</title>
    <style>
        body { 
            margin: 0; padding: 20px; font-family: sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
        }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #004a6e; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 20px; background: #eef7fb; border-radius: 12px; text-align: center; }
        .balance-box { background: #d1e7ef; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 30px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #0077be; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        .icon-btn { cursor: pointer; font-size: 1.2rem; border: none; background: none; margin: 0 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats-grid">
        <div class="stat-box">Erik<br><b id="erikTotal">$0.00</b></div>
        <div class="stat-box">Nadine<br><b id="nadineTotal">$0.00</b></div>
    </div>
    <div class="balance-box" id="oweMessage">Berekenen...</div>
    
    <form id="expenseForm">
        <label>Datum</label> <input type="date" id="date" required>
        <label>Wie betaalde?</label>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <label>Bedrag ($)</label> <input type="number" id="amount" step="0.01" required>
        <button type="submit">Opslaan</button>
    </form>

    <table>
        <thead><tr><th>Datum</th><th>Wie</th><th>Bedrag</th><th>Actie</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    const URL = "HIER_JE_APPS_SCRIPT_URL_PLAKKEN"; 

    // Datum formatteren naar dd/mm/yyyy
    function formatDate(dateStr) {
        const [y, m, d] = dateStr.split('-');
        return `${d}/${m}/${y}`;
    }

    // Data ophalen en berekenen
    fetch(URL).then(r => r.json()).then(data => {
        let eT = 0, nT = 0;
        document.getElementById('body').innerHTML = "";
        data.forEach((row, index) => {
            document.getElementById('body').innerHTML += `<tr>
                <td>${formatDate(row.date)}</td><td>${row.paidBy}</td><td>$${parseFloat(row.amount).toFixed(2)}</td>
                <td><button class="icon-btn" onclick="alert('Edit functie nog koppelen')">✏️</button><button class="icon-btn">🗑️</button></td>
            </tr>`;
            if(row.paidBy === 'Erik') eT += parseFloat(row.amount); else nT += parseFloat(row.amount);
        });
        
        // Totals
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
        
        // Balans (Wie moet betalen)
        const total = eT + nT;
        const target = total / 2;
        const msg = (eT > target) ? `Nadine moet Erik $${(eT - target).toFixed(2)} betalen.` : 
                    (nT > target) ? `Erik moet Nadine $${(nT - target).toFixed(2)} betalen.` : "Alles staat gelijk!";
        document.getElementById('oweMessage').innerText = msg;
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        };
        fetch(URL, { method: 'POST', body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
