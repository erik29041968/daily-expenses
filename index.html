<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses Tracker</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Add Expense</h2>
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
        </select>
        <input type="number" id="amount" placeholder="Amount" required>
        <input type="text" id="description" placeholder="Description (Optional)">
        <button type="submit" id="submitBtn">Save Expense</button>
    </form>

    <div id="status"></div>

    <script>
        const form = document.getElementById('expenseForm');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            statusDiv.textContent = "Saving...";

            const formData = {
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value,
                description: document.getElementById('description').value
            };

            const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0biSBZXRTbU8heHP4--Gd8ngnlCc9oTeFm51iVzltyjBQmNDeEJELguz0-28zZO5j/exec';

            try {
                // We use no-cors because browser security prevents simple cross-origin requests
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(formData)
                });
                
                statusDiv.textContent = "Expense saved successfully!";
                form.reset();
            } catch (error) {
                statusDiv.textContent = "Error saving. Please check your connection.";
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
