<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 bg-blue-50" onload="load()">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Expense Tracker</h1>
        
        <div class="bg-gray-800 text-white p-4 rounded-lg mb-6">
            <div class="flex justify-between mb-2"><span>Erik Paid:</span> <span id="eSum">$0</span></div>
            <div class="flex justify-between mb-2"><span>Nadine Paid:</span> <span id="nSum">$0</span></div>
            <div class="border-t border-gray-600 pt-2 mt-2 font-bold" id="settlement">Calculating...</div>
        </div>

        <input type="hidden" id="editId">
        <input id="date" type="date" class="w-full p-2 border rounded mb-2">
        <select id="cat" class="w-full p-2 border rounded mb-2">
            <option>Housing & Utilities</option><option>Food & Groceries</option>
            <option>Transportation</option><option>Personal Care & Health</option>
            <option>Debt Payments</option><option>Lifestyle & Entertainment</option>
            <option>Savings & Investments</option><option>Miscellaneous</option>
        </select>
        <input id="desc" class="w-full p-2 border rounded mb-2" placeholder="Description">
        <input id="amt" type="number" class="w-full p-2 border rounded mb-2" placeholder="Amount ($)">
        <select id="who" class="w-full p-2 border rounded mb-2"><option>Erik</option><option>Nadine</option></select>
        <button onclick="save()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Save Expense</button>

        <div id="list" class="mt-6 space-y-2"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCc8PolPHdzPz3wXjxiFc2Gckp9pnFzIBez4NMJape-ZDPZFp_urzkhEaj3DOXkHZP/exec"; 

        async function save() {
            const data = { action: document.getElementById('editId').value ? 'edit' : 'add', id: document.getElementById('editId').value || Date.now().toString(), date: document.getElementById('date').value, category: document.getElementById('cat').value, description: document.getElementById('desc').value, amount: document.getElementById('amt').value, who: document.getElementById('who').value };
            await fetch(URL, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        async function load() {
            try {
                const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'fetch' }) });
                const data = await res.json();
                let e = 0, n = 0;
                data.slice(1).forEach(r => { if(r[5] === 'Erik') e += parseFloat(r[4]); else n += parseFloat(r[4]); });
                document.getElementById('eSum').innerText = '$' + e.toFixed(2);
                document.getElementById('nSum').innerText = '$' + n.toFixed(2);
                
                let diff = (e - n) / 2;
                document.getElementById('settlement').innerText = diff > 0 ? `Nadine owes Erik: $${diff.toFixed(2)}` : (diff < 0 ? `Erik owes Nadine: $${Math.abs(diff).toFixed(2)}` : "Settled up!");

                const list = document.getElementById('list');
                data.slice(1).reverse().forEach(r => {
                    list.innerHTML += `<div class="p-2 border-b flex justify-between"><div><p class="font-bold">${r[3]}</p><p class="text-xs">${r[2]}</p></div><p>$${r[4]} (${r[5]})</p></div>`;
                });
            } catch(e) { console.error(e); alert("Check console for errors. Is URL correct?"); }
        }
    </script>
</body>
</html>
