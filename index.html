<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Ocean Expenses</title>
    <style>
        /* Pro webdesigner CSS: Forceert de background */
        html {
            background: #0077be url('https://images.unsplash.com/photo-1505144808409-192770258160?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed !important;
            background-size: cover !important;
            min-height: 100vh;
        }
        body { 
            margin: 0; padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .container { 
            max-width: 800px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #004a6e; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 20px; background: #eef7fb; border-radius: 12px; text-align: center; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.5rem; font-weight: bold; color: #004a6e; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 20px; background: #0077be; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
    </div>
    
    <form id="expenseForm">
        <label>Date</label> <input type="date" id="date" required>
        <label>Paid By</label>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <label>Amount ($)</label> <input type="number" id="amount" step="0.01" required>
        <button type="submit">Save Expense</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>Amount</th><th>Action</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyjfniBCxxquprfd29V5dY_dMLc-FhnvM8cQSqrHecd84yCucUSE8pNJQtKPOkLAxZU/exec"; 

    function deleteRow(index) {
        if(confirm('Are you sure you want to delete this?')) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: index + 2 }) })
            .then(() => location.reload());
        }
    }

    fetch(URL).then(r => r.json()).then(data => {
        let eT = 0, nT = 0;
        const tbody = document.getElementById('body');
        data.forEach((row, index) => {
            const amount = parseFloat(row.amount);
            tbody.innerHTML += `<tr><td>${row.date}</td><td>${row.paidBy}</td><td>$${amount.toFixed(2)}</td>
            <td><button class="action-btn" onclick="deleteRow(${index})">🗑️</button></td></tr>`;
            if(row.paidBy === 'Erik') eT += amount; else nT += amount;
        });
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { method: 'POST', body: JSON.stringify({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        })}).then(() => location.reload());
    };
</script>
</body>
</html>
