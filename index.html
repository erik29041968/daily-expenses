<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh;
        }
    </style>
</head>
<body class="p-4" onload="load()">
    <div class="max-w-md mx-auto bg-white/90 p-6 rounded-2xl shadow-xl backdrop-blur-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Expense Tracker</h1>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-blue-100 p-3 rounded text-center"><p class="text-xs text-gray-600">Erik Paid</p><p id="erikSum" class="font-bold text-blue-800">$0</p></div>
            <div class="bg-pink-100 p-3 rounded text-center"><p class="text-xs text-gray-600">Nadine Paid</p><p id="nadineSum" class="font-bold text-pink-800">$0</p></div>
        </div>
        
        <input type="hidden" id="editId">
        <input id="date" type="date" class="w-full p-2 border rounded mb-2">
        <select id="cat" class="w-full p-2 border rounded mb-2">
            <option>Essential Living</option><option>Transportation</option><option>Variable/Daily</option>
            <option>Health & Wellness</option><option>Obligations & Savings</option><option>Miscellaneous</option>
        </select>
        <input id="desc" class="w-full p-2 border rounded mb-2" placeholder="Description">
        <input id="amt" type="number" class="w-full p-2 border rounded mb-2" placeholder="Amount ($)">
        <select id="who" class="w-full p-2 border rounded mb-2">
            <option>Erik</option><option>Nadine</option>
        </select>
        <button onclick="save()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 mb-4">Save Expense</button>

        <div id="list" class="space-y-2"></div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCc8PolPHdzPz3wXjxiFc2Gckp9pnFzIBez4NMJape-ZDPZFp_urzkhEaj3DOXkHZP/exec"; // <--- PASTE YOUR URL HERE

        async function save() {
            const data = {
                action: document.getElementById('editId').value ? 'edit' : 'add',
                id: document.getElementById('editId').value || Date.now().toString(),
                date: document.getElementById('date').value,
                category: document.getElementById('cat').value,
                description: document.getElementById('desc').value,
                amount: document.getElementById('amt').value,
                who: document.getElementById('who').value
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        async function load() {
            const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'fetch' }) });
            const data = await res.json();
            const list = document.getElementById('list');
            let erikSum = 0, nadineSum = 0;
            list.innerHTML = "";
            
            data.slice(1).reverse().forEach(row => {
                if(row[5] === 'Erik') erikSum += parseFloat(row[4] || 0);
                if(row[5] === 'Nadine') nadineSum += parseFloat(row[4] || 0);
                
                list.innerHTML += `
                    <div class="bg-white p-3 rounded shadow flex justify-between items-center">
                        <div><p class="font-bold">${row[3]}</p><p class="text-xs text-gray-500">${row[1]} | ${row[2]} | ${row[5]}</p></div>
                        <div class="text-right">
                            <p class="font-bold">$${row[4]}</p>
                            <button onclick="editRow('${row[0]}','${row[1]}','${row[2]}','${row[3]}','${row[4]}','${row[5]}')" class="text-blue-500 text-xs">Edit</button>
                        </div>
                    </div>`;
            });
            document.getElementById('erikSum').innerText = '$' + erikSum.toFixed(2);
            document.getElementById('nadineSum').innerText = '$' + nadineSum.toFixed(2);
        }

        function editRow(id, d, c, desc, a, w) {
            document.getElementById('editId').value = id;
            document.getElementById('date').value = d; document.getElementById('cat').value = c;
            document.getElementById('desc').value = desc; document.getElementById('amt').value = a;
            document.getElementById('who').value = w;
        }
        load();
    </script>
</body>
</html>
