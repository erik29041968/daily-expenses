<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Our Expenses</h1>
        
        <input type="hidden" id="editId">
        <input id="date" type="date" class="w-full p-2 border rounded mb-2">
        <select id="cat" class="w-full p-2 border rounded mb-2">
            <option>Groceries</option><option>Rent</option><option>Fun</option><option>Travel</option>
        </select>
        <input id="desc" class="w-full p-2 border rounded mb-2" placeholder="Description">
        <input id="amt" type="number" class="w-full p-2 border rounded mb-2" placeholder="Amount">
        <select id="who" class="w-full p-2 border rounded mb-2">
            <option>Erik</option><option>Nadine</option>
        </select>
        <button onclick="save()" class="w-full bg-green-600 text-white p-2 rounded">Save Expense</button>

        <div id="list" class="mt-6 space-y-2"></div>
    </div>

    <script>
        const URL = "PASTE_YOUR_WEB_APP_URL_HERE";

        async function save() {
            const id = document.getElementById('editId').value || Date.now().toString();
            const data = {
                action: document.getElementById('editId').value ? 'edit' : 'add',
                id: id, date: document.getElementById('date').value,
                category: document.getElementById('cat').value,
                description: document.getElementById('desc').value,
                amount: document.getElementById('amt').value,
                who: document.getElementById('who').value
            };
            await fetch(URL, { method: 'POST', body: JSON.stringify(data) });
            location.reload();
        }

        async function load() {
            const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'fetch' }) });
            const data = await res.json();
            const list = document.getElementById('list');
            data.slice(1).reverse().forEach(row => {
                list.innerHTML += `
                    <div class="bg-white p-3 border rounded shadow-sm flex justify-between items-center">
                        <div><p class="font-bold">${row[3]}</p><p class="text-xs text-gray-500">${row[1]} | ${row[2]} | ${row[5]}</p></div>
                        <div><p class="font-bold">$${row[4]}</p>
                        <button onclick="editRow('${row[0]}','${row[1]}','${row[2]}','${row[3]}','${row[4]}','${row[5]}')" class="text-blue-500 text-xs">Edit</button></div>
                    </div>`;
            });
        }

        function editRow(id, d, c, desc, a, w) {
            document.getElementById('editId').value = id;
            document.getElementById('date').value = d; document.getElementById('cat').value = c;
            document.getElementById('desc').value = desc; document.getElementById('amt').value = a;
            document.getElementById('who').value = w;
        }
        load();
    </script>
</body>
</html>
