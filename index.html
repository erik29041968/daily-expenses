<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Ocean Expenses</title>
    <style>
        /* CSS voor de achtergrond - geforceerd om te tonen */
        body { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            background-repeat: no-repeat !important;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container { 
            width: 90%; 
            max-width: 800px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin: 40px 0;
        }

        h2 { text-align: center; color: #004a6e; font-size: 2.2rem; margin-bottom: 30px; }

        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 25px; background: #eef7fb; border-radius: 12px; text-align: center; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: bold; color: #004a6e; margin-top: 10px; }

        .balance-box { background: #0077be; color: white; padding: 20px; border-radius: 12px; text-align: center; font-size: 1.3rem; font-weight: 600; margin-bottom: 30px; }

        label { display: block; margin-top: 20px; font-weight: 600; color: #333; font-size: 1.1rem; }
        input, select { width: 100%; padding: 18px; margin-top: 8px; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 25px; background: #0077be; color: white; border: none; border-radius: 12px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #005f99; }

        table { width: 100%; margin-top: 40px; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #004a6e; color: #004a6e; }
        td { padding: 15px; border-bottom: 1px solid #ddd; font-size: 1.1rem; }
        .actions { display: flex; gap: 10px; }
        .icon-btn { cursor: pointer; font-size: 1.4rem; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
    </div>
    
    <div class="balance-box" id="oweMessage">Calculating...</div>
    
    <form id="expenseForm">
        <label>Date</label> <input type="date" id="date" required>
        <label>Who Paid?</label>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <label>Amount ($)</label> <input type="number" id="amount" step="0.01" required>
        <button type="submit">Save Expense</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>Amount</th><th>Actions</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    // Jouw URL is hier ingevuld
    const URL = "https://script.google.com/macros/s/AKfycbyjfniBCxxquprfd29V5dY_dMLc-FhnvM8cQSqrHecd84yCucUSE8pNJQtKPOkLAxZU/exec"; 

    function formatDisplayDate(dateStr) {
        if (!dateStr) return "";
        const [y, m, d] = dateStr.split('-');
        return `${d}/${m}/${y}`;
    }

    fetch(URL).then(r => r.json()).then(data => {
        let eT = 0, nT = 0;
        const tbody = document.getElementById('body');
        tbody.innerHTML = "";
        
        data.forEach((row) => {
            const amount = parseFloat(row.amount);
            tbody.innerHTML += `<tr>
                <td>${formatDisplayDate(row.date)}</td>
                <td>${row.paidBy}</td>
                <td>$${amount.toFixed(2)}</td>
                <td class="actions">
                    <button class="icon-btn" onclick="alert('Edit clicked')">✏️</button>
                    <button class="icon-btn" onclick="alert('Delete clicked')">🗑️</button>
                </td>
            </tr>`;
            if(row.paidBy === 'Erik') eT += amount; else nT += amount;
        });
        
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
        
        const total = eT + nT;
        const target = total / 2;
        const msg = (eT > target) ? `Nadine owes Erik $${(eT - target).toFixed(2)}` : 
                    (nT > target) ? `Erik owes Nadine $${(nT - target).toFixed(2)}` : "All settled!";
        document.getElementById('oweMessage').innerText = msg;
    });

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        };
        fetch(URL, { method: 'POST', body: JSON.stringify(data) })
            .then(() => { alert("Saved!"); location.reload(); });
    };
</script>
</body>
</html>
