<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild Ocean Expenses</title>
    <style>
        html, body { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0077be url('ocean.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        .container { 
            width: 92%; max-width: 600px; margin: 20px auto; background: rgba(255, 255, 255, 0.95); 
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #004a6e; margin-top: 0; }
        
        /* Summary Grid */
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 15px; background: #eef7fb; border-radius: 12px; text-align: center; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.4rem; font-weight: bold; color: #004a6e; }

        /* Form & Inputs */
        input, select { width: 100%; padding: 18px; margin: 8px 0; border: 2px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 18px; }
        button { width: 100%; padding: 18px; margin-top: 10px; background: #0077be; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* Table */
        table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #0077be; color: #004a6e; }
        td { padding: 15px 10px; border-bottom: 1px solid #ddd; font-size: 17px; }
        .action-btn { font-size: 22px; background: none; border: none; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
    </div>
    
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <input type="number" id="amount" step="0.01" placeholder="Amount ($)" required>
        <button type="submit">Save Expense</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>Amount</th><th></th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    // PLAK HIER JOUW URL:
    const URL = "PLAK_HIER_JE_DEPLOYMENT_URL"; 

    // Data ophalen en tabel vullen
    fetch(URL).then(r => r.json()).then(data => {
        let eT = 0, nT = 0;
        const tbody = document.getElementById('body');
        tbody.innerHTML = "";
        data.forEach((row, i) => {
            const amt = parseFloat(row.amount);
            tbody.innerHTML += `<tr>
                <td>${row.date}</td><td>${row.paidBy}</td><td>$${amt.toFixed(2)}</td>
                <td>
                    <button class="action-btn" onclick="editRow(${i+2}, '${row.date}', '${row.paidBy}', ${amt})">✏️</button>
                    <button class="action-btn" onclick="deleteRow(${i+2})">🗑️</button>
                </td>
            </tr>`;
            if(row.paidBy === 'Erik') eT += amt; else nT += amt;
        });
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
    });

    // Functies
    function deleteRow(index) {
        if(confirm('Verwijderen?')) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: index }) })
            .then(() => location.reload());
        }
    }

    function editRow(index, oldDate, oldWho, oldAmt) {
        const date = prompt("Date:", oldDate);
        const paidBy = prompt("Who (Erik/Nadine):", oldWho);
        const amount = prompt("Amount:", oldAmt);
        if(date && paidBy && amount) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'edit', index: index, date, paidBy, amount }) })
            .then(() => location.reload());
        }
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { method: 'POST', body: JSON.stringify({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        })}).then(() => location.reload());
    };
</script>
</body>
</html>
