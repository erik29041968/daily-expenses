<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; padding: 20px; 
            background: url('https://images.unsplash.com/photo-1505144808409-192770258160') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #333;
        }
        .container { 
            max-width: 500px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.9); 
            padding: 2rem; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        h2 { text-align: center; color: #004a6e; font-size: 1.8rem; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 1.1rem; }
        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 1rem; 
        }
        button { background-color: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #005f99; }
        
        /* Lijst stijlen */
        #expenseList { margin-top: 20px; border-top: 2px solid #ccc; padding-top: 10px; }
        .expense-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .edit-btn { background: #f39c12; width: auto; padding: 5px 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    
    <form id="expenseForm">
        <input type="hidden" id="editIndex" value=""> <label>Date</label>
        <input type="date" id="date" required>
        
        <label>Who Paid?</label>
        <select id="paidBy">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        
        <label>Amount ($)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
        
        <label>Category</label>
        <select id="category">
            <option value="Groceries">Groceries</option>
            <option value="Restaurant">Restaurant</option>
            <option value="Fuel">Fuel</option>
            <option value="Gifts">Gifts</option>
            <option value="Other">Other</option>
        </select>
        
        <button type="submit" id="submitBtn">Save Expense</button>
        <button type="button" id="cancelBtn" style="display:none; background:#999;" onclick="resetForm()">Cancel Edit</button>
    </form>

    <div id="expenseList">
        <h3>Recent Expenses</h3>
        <div id="listContainer"></div>
    </div>
</div>

<script>
    const form = document.getElementById('expenseForm');
    const listContainer = document.getElementById('listContainer');
    const editIndexInput = document.getElementById('editIndex');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    // Voorbeeld data (in echte app moet je dit ophalen via fetch('URL'))
    let expenses = []; 

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const isEditing = editIndexInput.value !== "";
        const formData = {
            action: isEditing ? 'update' : 'add',
            index: editIndexInput.value, // Welke rij in sheet?
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: parseFloat(document.getElementById('amount').value),
            category: document.getElementById('category').value
        };

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0biSBZXRTbU8heHP4--Gd8ngnlCc9oTeFm51iVzltyjBQmNDeEJELguz0-28zZO5j/exec';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(formData)
            });
            alert(isEditing ? "Expense Updated!" : "Expense Saved!");
            resetForm();
            // Hier zou je de lijst opnieuw moeten ophalen
        } catch (error) {
            alert("Error saving.");
        }
    });

    function editExpense(index) {
        const item = expenses[index];
        document.getElementById('date').value = item.date;
        document.getElementById('paidBy').value = item.paidBy;
        document.getElementById('amount').value = item.amount;
        document.getElementById('category').value = item.category;
        
        editIndexInput.value = index;
        submitBtn.textContent = "Update Expense";
        cancelBtn.style.display = "block";
    }

    function resetForm() {
        form.reset();
        editIndexInput.value = "";
        submitBtn.textContent = "Save Expense";
        cancelBtn.style.display = "none";
    }
</script>
</body>
</html>
