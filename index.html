<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Ocean View</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 20px; 
            /* Ocean Gradient Background */
            background: linear-gradient(to bottom, #006994, #e0f7fa);
            min-height: 100vh;
            color: #333;
        }
        .container { 
            max-width: 450px; margin: 0 auto; background: rgba(255, 255, 255, 0.9); 
            padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h2 { text-align: center; color: #004a6e; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0077be; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #005f99; }
        
        #totalDisplay { 
            text-align: center; font-size: 1.5rem; font-weight: bold; 
            margin: 20px 0; padding: 15px; background: #e0f7fa; border-radius: 8px; 
            color: #004a6e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Expense Tracker</h2>
    
    <div id="totalDisplay">Total: $0.00</div>

    <form id="expenseForm">
        <input type="date" id="date" required>
        <input type="text" id="paidBy" placeholder="Who paid? (e.g., Erik/Nadine)" required>
        <input type="number" id="amount" placeholder="Amount ($)" step="0.01" required>
        <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="description" placeholder="Description">
        <button type="submit" id="submitBtn">Add Expense</button>
    </form>
</div>

<script>
    const form = document.getElementById('expenseForm');
    const totalDisplay = document.getElementById('totalDisplay');
    let runningTotal = 0;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const amount = parseFloat(document.getElementById('amount').value);
        const formData = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: amount,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value
        };

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0biSBZXRTbU8heHP4--Gd8ngnlCc9oTeFm51iVzltyjBQmNDeEJELguz0-28zZO5j/exec';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(formData)
            });

            // Update local total
            runningTotal += amount;
            totalDisplay.textContent = `Total: $${runningTotal.toFixed(2)}`;
            
            form.reset();
            alert("Expense Saved!");
        } catch (error) {
            alert("Error saving data.");
        }
    });
</script>
</body>
</html>
