<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Ocean Expenses</title>
    <style>
        /* Pro CSS */
        html, body { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0077be url('ocean.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        .container { 
            max-width: 800px; margin: 40px auto; background: rgba(255, 255, 255, 0.95); 
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #004a6e; margin-bottom: 30px; }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 20px; background: #eef7fb; border-radius: 12px; text-align: center; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.5rem; font-weight: bold; color: #004a6e; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 20px; background: #0077be; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
    </div>
    
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <input type="number" id="amount" step="0.01" placeholder="Amount ($)" required>
        <button type="submit">Save Expense</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>Amount</th><th>Actions</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    // PLAK HIER JOUW URL:
    const URL = "https://script.google.com/macros/s/AKfycbyjfniBCxxquprfd29V5dY_dMLc-FhnvM8cQSqrHecd84yCucUSE8pNJQtKPOkLAxZU/exec"; 

    // Ophalen Data
    fetch(URL)
        .then(r => r.json())
        .then(data => {
            let eT = 0, nT = 0;
            const tbody = document.getElementById('body');
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                const amt = parseFloat(row.amount);
                tbody.innerHTML += `<tr>
                    <td>${row.date}</td><td>${row.paidBy}</td><td>$${amt.toFixed(2)}</td>
                    <td>
                        <button class="action-btn" onclick="editRow(${i+2}, '${row.date}', '${row.paidBy}', ${amt})">✏️</button>
                        <button class="action-btn" onclick="deleteRow(${i+2})">🗑️</button>
                    </td>
                </tr>`;
                if(row.paidBy === 'Erik') eT += amt; else nT += amt;
            });
            document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
            document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
        });

    // Verwijderen
    function deleteRow(index) {
        if(confirm('Are you sure you want to delete this?')) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: index }) })
            .then(() => location.reload());
        }
    }

    // Bewerken
    function editRow(index, oldDate, oldWho, oldAmt) {
        const date = prompt("New Date (YYYY-MM-DD):", oldDate);
        const paidBy = prompt("Who Paid (Erik/Nadine):", oldWho);
        const amount = prompt("New Amount:", oldAmt);
        if(date && paidBy && amount) {
            fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'edit', index: index, date, paidBy, amount }) })
            .then(() => location.reload());
        }
    }

    // Toevoegen
    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { method: 'POST', body: JSON.stringify({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value
        })}).then(() => location.reload());
    };
</script>
</body>
</html>
