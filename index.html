<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Kiwi &Erik</title>
    <style>
        /* Forceer de achtergrond */
        html, body { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: sans-serif;
            background: #0077be url('ocean.jpg') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        .container { 
            max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.95); 
            padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        input, select, button { 
            width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ccc; 
            border-radius: 8px; box-sizing: border-box; font-size: 16px; 
        }
        button { background: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses Kiwi & Erik</h2>
    <form id="expenseForm">
        <input type="date" id="date" required>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <select id="category"><option>Groceries</option><option>Coffee</option><option>Fuel</option><option>Other</option></select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit">ADD</button>
    </form>
    <table><tbody id="body"></tbody></table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbxaj3NC5yU-Igj3zyZ5i5krrFrEJ4HzcuMOIUDw9kwoS4VyITET5CtzxMSMnLCUoBd2/exec';

    function refresh() {
        fetch(URL).then(r => r.json()).then(data => {
            const tbody = document.getElementById('body');
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                tbody.innerHTML += `<tr>
                    <td>${row.date}<br><b>${row.category}</b> (${row.paidBy})</td>
                    <td>$${row.amount}</td>
                    <td>
                        <button onclick="del(${i+2})">🗑️</button>
                    </td>
                </tr>`;
            });
        });
    }

    async function del(idx) {
        await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: idx }) });
        refresh();
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { method: 'POST', body: JSON.stringify({
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            category: document.getElementById('category').value,
            amount: document.getElementById('amount').value
        })}).then(() => { refresh(); document.getElementById('expenseForm').reset(); });
    };

    refresh();
</script>
</body>
</html>
