<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; padding: 20px; 
            /* Bright Ocean Blue */
            background: linear-gradient(135deg, #0077be, #4facfe);
            min-height: 100vh;
            color: #333;
        }
        .container { 
            max-width: 500px; margin: 0 auto; background: white; 
            padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #004a6e; font-size: 1.8rem; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 1.1rem; }
        input, select, button { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; 
        }
        button { background-color: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #005f99; }
        
        /* 3-Column Stats Style */
        .stats-grid { display: flex; gap: 10px; margin-top: 20px; }
        .stat-box { 
            flex: 1; padding: 10px; border-radius: 10px; 
            text-align: center; font-size: 0.9rem; font-weight: bold;
            background: #eef; border: 1px solid #ccc;
        }
        .stat-val { display: block; font-size: 1.2rem; color: #004a6e; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Expense Tracker</h2>
    
    <form id="expenseForm">
        <label>Date</label>
        <input type="date" id="date" required>
        
        <label>Who Paid?</label>
        <select id="paidBy">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        
        <label>Amount ($)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00" required>
        
        <label>Category</label>
        <select id="category">
            <option value="Groceries">Groceries</option>
            <option value="Restaurant">Restaurant</option>
            <option value="Fuel">Fuel</option>
            <option value="Gifts">Gifts</option>
            <option value="Other">Other</option>
        </select>
        
        <button type="submit" id="submitBtn">Save Expense</button>
    </form>

    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Balance<span id="balance" class="stat-val">$0.00</span></div>
    </div>
</div>

<script>
    const form = document.getElementById('expenseForm');
    const erikEl = document.getElementById('erikTotal');
    const nadineEl = document.getElementById('nadineTotal');
    const balanceEl = document.getElementById('balance');
    
    let erikT = 0;
    let nadineT = 0;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const paidBy = document.getElementById('paidBy').value;
        const amount = parseFloat(document.getElementById('amount').value);
        
        const formData = {
            date: document.getElementById('date').value,
            paidBy: paidBy,
            amount: amount,
            category: document.getElementById('category').value,
            description: "N/A"
        };

        // Update UI Totals
        if (paidBy === 'Erik') erikT += amount;
        else nadineT += amount;
        
        erikEl.textContent = `$${erikT.toFixed(2)}`;
        nadineEl.textContent = `$${nadineT.toFixed(2)}`;
        balanceEl.textContent = `$${Math.abs(erikT - nadineT).toFixed(2)}`;

        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw0biSBZXRTbU8heHP4--Gd8ngnlCc9oTeFm51iVzltyjBQmNDeEJELguz0-28zZO5j/exec';

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(formData)
            });
            form.reset();
            alert("Saved!");
        } catch (error) {
            alert("Error saving.");
        }
    });
</script>
</body>
</html>
