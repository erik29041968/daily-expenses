<table id="expenseTable">
    <thead>
        <tr><th>Datum</th><th>Info</th><th>Bedrag</th><th>Actie</th></tr>
    </thead>
    <tbody id="body"></tbody>
</table>

<script>
    const URL = "PLAK_HIER_JE_DEPLOYMENT_URL";

    function refresh() {
        fetch(URL).then(r => r.json()).then(data => {
            const tbody = document.getElementById('body');
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                // Datum formatteren (check of het een geldige datum is)
                let d = new Date(row.date);
                let dateStr = !isNaN(d) ? d.toLocaleDateString('nl-NL') : row.date;
                
                tbody.innerHTML += `<tr>
                    <td>${dateStr}</td>
                    <td><b>${row.category}</b> (${row.paidBy})</td>
                    <td>$${row.amount}</td>
                    <td><button onclick="del(${i+2})">🗑️</button></td>
                </tr>`;
            });
        });
    }

    async function del(idx) {
        if(!confirm("Verwijderen?")) return;
        await fetch(URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'delete', index: idx }) 
        });
        refresh();
    }

    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        fetch(URL, { 
            method: 'POST', 
            body: JSON.stringify({
                date: document.getElementById('date').value,
                paidBy: document.getElementById('paidBy').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            })
        }).then(() => { 
            refresh(); 
            document.getElementById('expenseForm').reset(); 
        });
    };

    refresh();
</script>
