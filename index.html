<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Kiwi & Erik</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Arial, sans-serif; 
                     background: #0077be url('ocean.jpg') no-repeat center center fixed !important; 
                     background-size: cover !important; }
        .container { max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.95); 
                     padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        form, table { width: 100%; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; 
                                border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; }
        table { border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .icon-btn { width: auto; padding: 5px; margin: 0 2px; border: none; background: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses Kiwi & Erik</h2>
    <form id="expenseForm">
        <input type="hidden" id="editIndex"> 
        <input type="date" id="date" required>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <select id="category"><option value="Groceries">Groceries</option><option value="Coffee">Coffee</option><option value="Fuel">Fuel</option><option value="Other">Other</option></select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit" id="submitBtn">ADD</button>
    </form>
    <table>
        <tbody id="body">
            <tr><td colspan="3">Laden...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyQ9EqkcDJCcj-4EnOB_a1E81g6sx7H7mP7gozDojdaYudYvgVwhAmd0LRjuBWDL7rT/exec";
    let editMode = false;

    async function refresh() {
        console.log("Stap 2: Refreshing...");
        try {
            const response = await fetch(URL + "?t=" + Date.now());
            if (!response.ok) throw new Error("Netwerkfout: " + response.status);
            const data = await response.json();
            const tbody = document.getElementById('body');
            tbody.innerHTML = "";
            data.forEach((row, i) => {
                let cleanDate = String(row.date || "").split('T')[0];
                tbody.innerHTML += `<tr>
                    <td>${cleanDate}<br><b>${row.category || ''}</b> (${row.paidBy || ''})</td>
                    <td>$${row.amount || '0'}</td>
                    <td>
                        <button class="icon-btn" onclick="edit(${i+2}, '${row.date}', '${row.paidBy}', '${row.category}', ${row.amount})">📝</button>
                        <button class="icon-btn" onclick="del(${i+2})">🗑️</button>
                    </td>
                </tr>`;
            });
            console.log("Stap 2: Refresh succesvol.");
        } catch(err) {
            console.error("Stap 2: Fout bij laden:", err);
            document.getElementById('body').innerHTML = "<tr><td colspan='3'>Laden mislukt.</td></tr>";
        }
    }

    function edit(idx, date, paidBy, category, amount) {
        document.getElementById('editIndex').value = idx;
        document.getElementById('date').value = date.split('T')[0];
        document.getElementById('paidBy').value = paidBy;
        document.getElementById('category').value = category;
        document.getElementById('amount').value = amount;
        document.getElementById('submitBtn').innerText = "UPDATE";
        editMode = true;
        window.scrollTo(0,0);
    }

    async function del(idx) {
        if(!confirm("Ok to delete?")) return;
        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: idx }) });
            await refresh();
        } catch(e) { console.error(e); }
    }

    document.getElementById('expenseForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const action = editMode ? 'update' : 'add';
        
        btn.innerText = "Busy...";
        btn.disabled = true;
        
        try {
            console.log("Stap 1: Versturen...");
            await fetch(URL, { method: 'POST', body: JSON.stringify({
                action: action,
                index: document.getElementById('editIndex').value,
                date: document.getElementById('date').value,
                paidBy: document.getElementById('paidBy').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            })});
            console.log("Stap 1: Backend OK.");
        } catch (err) {
            console.error("Stap 1: Fout bij POST:", err);
            alert("Er ging iets mis met opslaan.");
        } finally {
            // UI wordt NU al vrijgegeven, verversing gebeurt daarna op de achtergrond
            btn.innerText = "ADD";
            btn.disabled = false;
            editMode = false;
            document.getElementById('expenseForm').reset();
            console.log("Stap 1: UI vrijgegeven, start refresh.");
            
            // Nu pas verversen
            await refresh();
        }
    };

    refresh();
</script>
</body>
</html>
