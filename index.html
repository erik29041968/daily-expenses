<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        /* Forceer de achtergrond met !important voor zekerheid */
        body { 
            margin: 0; padding: 20px;
            font-family: sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            background-color: #0077be !important;
        }
        /* Grotere display */
        .container { 
            max-width: 800px; margin: 40px auto; background: white; 
            padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #004a6e; font-size: 2rem; margin-bottom: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .box { padding: 20px; background: #eef7fb; border-radius: 12px; text-align: center; flex: 1; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 1.1rem; }
        input, select { width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #ccc; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; }
        button { width: 100%; padding: 20px; margin-top: 25px; background: #0077be; color: white; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 15px; text-align: left; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats">
        <div class="box">Erik<br><b id="erikTotal">$0.00</b></div>
        <div class="box">Nadine<br><b id="nadineTotal">$0.00</b></div>
    </div>
    
    <form id="expenseForm">
        <label>Date</label> <input type="date" id="date" required>
        <label>Who Paid?</label>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <label>Amount</label> <input type="number" id="amount" step="0.01" required>
        <label>Category</label>
        <select id="category"><option>Groceries</option><option>Restaurant</option><option>Fuel</option></select>
        <button type="submit">Save Expense</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>$</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    // VUL HIER JOUW URL IN
    const URL = "https://script.google.com/macros/s/AKfycbwMEZlHpY0oqLtyh_CWM6JWpnR9cANekKzImioy1vzSid4knNv3AoHKYDzvJBWscU42/exec"; 

    // Ophalen
    fetch(URL).then(r => r.json()).then(data => {
        let eT = 0, nT = 0;
        data.forEach(row => {
            document.getElementById('body').innerHTML += `<tr><td>${row.date}</td><td>${row.paidBy}</td><td>${row.amount}</td></tr>`;
            if(row.paidBy === 'Erik') eT += parseFloat(row.amount); else nT += parseFloat(row.amount);
        });
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
    }).catch(e => console.log("Connectiefout bij laden"));

    // Opslaan
    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value,
            category: document.getElementById('category').value
        };
        fetch(URL, { method: 'POST', body: JSON.stringify(data) })
            .then(() => { alert("Opgeslagen!"); location.reload(); })
            .catch(e => alert("Fout: " + e));
    };
</script>
</body>
</html>
