<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Kiwi & Erik</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Arial, sans-serif; 
                     background: #0077be url('ocean.jpg') no-repeat center center fixed !important; 
                     background-size: cover !important; }
        .container { max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.95); 
                     padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #333; }
        form, table { width: 100%; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; 
                                border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        table { border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .icon-btn { width: auto; padding: 5px; margin: 0 2px; border: none; background: none; font-size: 18px; cursor: pointer; }
        
        #settlementBox { margin-top: 20px; padding: 15px; background: #eef7ff; border: 1px solid #0077be; 
                         border-radius: 8px; text-align: center; color: #333; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses</h2>
    <form id="expenseForm">
        <input type="hidden" id="editIndex"> 
        <input type="date" id="date" required>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <select id="category"><option value="Groceries">Groceries</option><option value="Coffee">Coffee</option><option value="Fuel">Fuel</option><option value="Gifts">Gifts</option><option value="Other">Other</option></select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit" id="submitBtn">ADD</button>
    </form>
    
    <div id="settlementBox">Calculating balance...</div>
    
    <table>
        <tbody id="body">
            <tr><td colspan="3">Charging kiwis...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyQ9EqkcDJCcj-4EnOB_a1E81g6sx7H7mP7gozDojdaYudYvgVwhAmd0LRjuBWDL7rT/exec";
    let editMode = false;

    async function refresh() {
        try {
            const response = await fetch(URL + "?t=" + Date.now());
            let data = await response.json();
            
            // Sort by date: Newest at the top
            data.sort((a, b) => new Date(b.date) - new Date(a.date));

            const tbody = document.getElementById('body');
            tbody.innerHTML = "";
            
            let erikPaid = 0;
            let nadinePaid = 0;

            data.forEach((row, i) => {
                let amt = parseFloat(row.amount) || 0;
                if (row.paidBy === 'Erik') erikPaid += amt;
                else if (row.paidBy === 'Nadine') nadinePaid += amt;

                let cleanDate = String(row.date || "").split('T')[0];
                tbody.innerHTML += `<tr>
                    <td>${cleanDate}<br><b>${row.category || ''}</b> (${row.paidBy || ''})</td>
                    <td>$${amt.toFixed(2)}</td>
                    <td>
                        <button class="icon-btn" onclick="edit(${i+2}, '${row.date}', '${row.paidBy}', '${row.category}', ${amt})">📝</button>
                        <button class="icon-btn" onclick="del(${i+2})">🗑️</button>
                    </td>
                </tr>`;
            });

            updateSettlement(erikPaid, nadinePaid);

        } catch(err) {
            document.getElementById('body').innerHTML = "<tr><td colspan='3'>Error loading data.</td></tr>";
        }
    }

    function updateSettlement(erikPaid, nadinePaid) {
        const total = erikPaid + nadinePaid;
        const target = total / 2;
        const box = document.getElementById('settlementBox');
        
        let diff = erikPaid - target; 
        
        if (Math.abs(diff) < 0.01) {
            box.innerHTML = "Perfectly balanced! (50/50)";
        } else if (diff > 0) {
            box.innerHTML = `Nadine owes Erik: <b>$${diff.toFixed(2)}</b>`;
        } else {
            box.innerHTML = `Erik owes Nadine: <b>$${Math.abs(diff).toFixed(2)}</b>`;
        }
    }

    function edit(idx, date, paidBy, category, amount) {
        document.getElementById('editIndex').value = idx;
        document.getElementById('date').value = date.split('T')[0];
        document.getElementById('paidBy').value = paidBy;
        document.getElementById('category').value = category;
        document.getElementById('amount').value = amount;
        document.getElementById('submitBtn').innerText = "UPDATE";
        editMode = true;
        window.scrollTo(0,0);
    }

    async function del(idx) {
        if(!confirm("Confirm delete?")) return;
        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: idx }) });
            await refresh();
        } catch(e) { console.error(e); }
    }

    document.getElementById('expenseForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Busy...";
        btn.disabled = true;
        const action = editMode ? 'update' : 'add';
        
        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify({
                action: action,
                index: document.getElementById('editIndex').value,
                date: document.getElementById('date').value,
                paidBy: document.getElementById('paidBy').value,
                category: document.getElementById('category').value,
                amount: document.getElementById('amount').value
            })});
        } catch (err) { console.log("Save error."); } 
        finally {
            document.getElementById('expenseForm').reset();
            btn.innerText = "ADD";
            btn.disabled = false;
            editMode = false;
            document.getElementById('date').valueAsDate = new Date();
            await refresh();
        }
    };

    document.getElementById('date').valueAsDate = new Date();
    refresh();
</script>
</body>
</html>
