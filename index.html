<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; 
        margin: 0 !important; 
        padding: 20px !important; 
        background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                    url('https://images.unsplash.com/photo-1505144808409-192770258160') !important;
        background-size: cover !important;
        background-attachment: fixed !important;
        min-height: 100vh !important;
        color: #333 !important;
    }
    /* ... rest van je CSS ... */
</style>
</head>
<body>
<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Balance<span id="balance" class="stat-val">$0.00</span></div>
    </div>
    <form id="expenseForm">
        <input type="hidden" id="editIndex" value="">
        <label>Date</label> <input type="date" id="date" required>
        <label>Who Paid?</label>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <label>Amount ($)</label> <input type="number" id="amount" step="0.01" required>
        <label>Category</label>
        <select id="category">
            <option value="Groceries">Groceries</option><option value="Restaurant">Restaurant</option>
            <option value="Fuel">Fuel</option><option value="Gifts">Gifts</option>
        </select>
        <button type="submit" id="submitBtn">Save Expense</button>
        <button type="button" id="cancelBtn" style="display:none; background:#999;" onclick="resetForm()">Cancel</button>
    </form>
    <table>
        <thead><tr><th>Date</th><th>Who</th><th>$</th><th>Action</th></tr></thead>
        <tbody id="expenseTableBody"></tbody>
    </table>
</div>

<script>
    // --- PAS DIT AAN NAAR JOUW DEPLOYMENT URL ---
    const SCRIPT_URL = "Hhttps://script.google.com/macros/s/AKfycbyO07UAeUt-GLh44_mdTK75wVukuEWE-AVlw4BVExRab41M8uoP34FD0xrpgRUuRmja/exec"; 

    let expenses = [];

    // 1. Laden van data bij opstarten
    async function loadExpenses() {
        try {
            const response = await fetch(SCRIPT_URL);
            expenses = await response.json();
            renderTable();
            updateTotals();
        } catch (err) { console.error("Fout bij laden:", err); }
    }

    // 2. Formulier versturen naar Sheets
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: parseFloat(document.getElementById('amount').value),
            category: document.getElementById('category').value
        };

        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(data)
        });
        
        loadExpenses(); // Refresh de tabel
        resetForm();
    });

    function updateTotals() {
        let erikT = 0, nadineT = 0;
        expenses.forEach(item => {
            if (item.paidBy === 'Erik') erikT += item.amount;
            else nadineT += item.amount;
        });
        document.getElementById('erikTotal').textContent = `$${erikT.toFixed(2)}`;
        document.getElementById('nadineTotal').textContent = `$${nadineT.toFixed(2)}`;
        document.getElementById('balance').textContent = `$${Math.abs(erikT - nadineT).toFixed(2)}`;
    }

    function renderTable() {
        const tbody = document.getElementById('expenseTableBody');
        tbody.innerHTML = '';
        expenses.forEach((item, index) => {
            tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.paidBy}</td><td>$${item.amount.toFixed(2)}</td><td><button class="edit-btn">Edit</button></td></tr>`;
        });
    }

    function resetForm() { document.getElementById('expenseForm').reset(); }

    loadExpenses(); // Start het laden
</script>
</body>
</html>
