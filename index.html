<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        /* CSS voor de Oceaan look */
        html, body { 
            margin: 0; padding: 0; min-height: 100vh;
            font-family: sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #0077be; /* Fallback kleur */
        }
        .container { 
            max-width: 500px; margin: 40px auto; background: white; 
            padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .box { padding: 10px; background: #f0f0f0; border-radius: 8px; text-align: center; flex: 1; margin: 0 5px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #0077be; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    <div class="stats">
        <div class="box">Erik<br><b id="erikTotal">$0.00</b></div>
        <div class="box">Nadine<br><b id="nadineTotal">$0.00</b></div>
    </div>
    
    <form id="expenseForm">
        <label>Date</label> <input type="date" id="date" required>
        <label>Paid By</label>
        <select id="paidBy"><option>Erik</option><option>Nadine</option></select>
        <label>Amount</label> <input type="number" id="amount" step="0.01" required> <label>Category</label>
        <select id="category"><option>Groceries</option><option>Restaurant</option><option>Fuel</option></select>
        <button type="submit">Save</button>
    </form>

    <table id="table">
        <thead><tr><th>Date</th><th>Who</th><th>$</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
    const URL = "HIER_JE_APPS_SCRIPT_URL_PLAKKEN"; 

    // Ophalen data
    fetch(URL).then(res => res.json()).then(data => {
        let eT = 0, nT = 0;
        data.forEach(row => {
            document.getElementById('body').innerHTML += `<tr><td>${row.date}</td><td>${row.paidBy}</td><td>${row.amount}</td></tr>`;
            if(row.paidBy === 'Erik') eT += parseFloat(row.amount); else nT += parseFloat(row.amount);
        });
        document.getElementById('erikTotal').innerText = '$' + eT.toFixed(2);
        document.getElementById('nadineTotal').innerText = '$' + nT.toFixed(2);
    });

    // Versturen data
    document.getElementById('expenseForm').onsubmit = (e) => {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: document.getElementById('amount').value,
            category: document.getElementById('category').value
        };
        fetch(URL, { method: 'POST', body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
