<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 10px; text-align: center; background: #eee; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; }
        button { width: 100%; padding: 10px; background: blue; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Wild Ocean Expenses</h2>
        <div class="stats-grid">
            <div class="stat-box">Erik<span id="erikTotal" style="display:block;">$0</span></div>
            <div class="stat-box">Nadine<span id="nadineTotal" style="display:block;">$0</span></div>
        </div>
        <form id="expenseForm">
            <input type="date" id="date" required>
            <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
            <input type="number" id="amount" placeholder="Amount" required>
            <select id="category"><option>Groceries</option><option>Restaurant</option></select>
            <button type="submit">Save</button>
        </form>
    </div>
    <script>
        console.log("Script geladen"); // Check dit in je F12 Console
        // VOEG HIER JE SCRIPT LOGICA TOE
    </script>
</body>
</html>
