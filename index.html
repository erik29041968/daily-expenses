<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-200 p-10">
    <div class="bg-white p-5 rounded shadow">
        <h1 class="text-2xl font-bold">Debug Mode</h1>
        <button onclick="testConnection()" class="bg-red-500 text-white p-2 rounded">Test Connection</button>
        <p id="output" class="mt-4 font-mono text-sm"></p>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCc8PolPHdzPz3wXjxiFc2Gckp9pnFzIBez4NMJape-ZDPZFp_urzkhEaj3DOXkHZP/exec";

        async function testConnection() {
            const output = document.getElementById('output');
            output.innerText = "Testing...";
            try {
                const response = await fetch(URL, { method: 'POST', mode: 'no-cors' });
                output.innerText = "Response received (no-cors mode hides details).";
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
</html>
