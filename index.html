<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses Kiwi & Erik</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100vh; font-family: Arial, sans-serif; 
                     background: #0077be url('ocean.jpg') no-repeat center center fixed !important; 
                     background-size: cover !important; }
        .container { max-width: 500px; margin: 20px auto; background: rgba(255,255,255,0.95); 
                     padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #333; }
        form, table { width: 100%; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; 
                                border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #0077be; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        table { border-collapse: collapse; margin-top: 10px; background: white; width: 100%; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .icon-btn { width: auto; padding: 5px; margin: 0 2px; border: none; background: none; font-size: 18px; cursor: pointer; }
        
        #settlementBox { margin-top: 20px; padding: 15px; background: #eef7ff; border: 1px solid #0077be; 
                         border-radius: 8px; text-align: center; color: #333; font-weight: bold; }

        .month-header { 
            background: #0077be; color: white; padding: 10px; cursor: pointer; 
            margin-top: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .month-content { display: none; margin-bottom: 10px; }
        .month-content.active { display: block; }
        .arrow { font-size: 12px; transition: transform 0.3s; }
        .active-arrow { transform: rotate(180deg); }
    </style>
</head>
<body>
<div class="container">
    <h2>Daily Expenses</h2>
    <form id="expenseForm">
        <input type="hidden" id="editIndex"> 
        <input type="date" id="date" required>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <select id="category"><option value="Groceries">Groceries</option><option value="Coffee">Coffee</option><option value="Fuel">Fuel</option><option value="Gifts">Gifts</option><option value="Other">Other</option></select>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <button type="submit" id="submitBtn">ADD</button>
    </form>
    
    <div id="settlementBox">Calculating balance...</div>
    
    <div id="expenseList">
        <p style="text-align:center; padding:20px;">Charging kiwis...</p>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyQ9EqkcDJCcj-4EnOB_a1E81g6sx7H7mP7gozDojdaYudYvgVwhAmd0LRjuBWDL7rT/exec";
    let editMode = false;

    async function refresh() {
        try {
            const response = await fetch(URL + "?t=" + Date.now());
            let rawData = await response.json();
            
            // Map original Google Sheet index before sorting (Sheet row = array index + 2)
            let data = rawData.map((item, index) => ({ ...item, sheetIndex: index + 2 }));
            
            // Sort by date: Newest at the top
            data.sort((a, b) => new Date(b.date) - new Date(a.date));

            const listDiv = document.getElementById('expenseList');
            listDiv.innerHTML = "";
            
            let erikPaid = 0;
            let nadinePaid = 0;

            const groups = {};
            data.forEach((row) => {
                let amt = parseFloat(row.amount) || 0;
                if (row.paidBy === 'Erik') erikPaid += amt;
                else if (row.paidBy === 'Nadine') nadinePaid += amt;

                const d = new Date(row.date);
                const monthName = d.toLocaleString('default', { month: 'long', year: 'numeric' });
                if (!groups[monthName]) groups[monthName] = [];
                groups[monthName].push(row);
            });

            const currentMonthName = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });

            for (const month in groups) {
                const isCurrentMonth = (month === currentMonthName);
                const monthSection = document.createElement('div');
                monthSection.innerHTML = `
                    <div class="month-header" onclick="toggleMonth(this)">
                        <span>${month}</span>
                        <span class="arrow ${isCurrentMonth ? 'active-arrow' : ''}">▼</span>
                    </div>
                    <div class="month-content ${isCurrentMonth ? 'active' : ''}">
                        <table>
                            <tbody>
                                ${groups[month].map(row => {
                                    let cleanDate = String(row.date || "").split('T')[0];
                                    let amt = parseFloat(row.amount) || 0;
                                    return `<tr>
                                        <td>${cleanDate}<br><b>${row.category || ''}</b> (${row.paidBy || ''})</td>
                                        <td>$${amt.toFixed(2)}</td>
                                        <td style="text-align:right">
                                            <button class="icon-btn" onclick="edit(${row.sheetIndex}, '${row.date}', '${row.paidBy}', '${row.category}', ${amt})">📝</button>
                                            <button class="icon-btn" onclick="del(${row.sheetIndex})">🗑️</button>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                listDiv.appendChild(monthSection);
            }

            updateSettlement(erikPaid, nadinePaid);

        } catch(err) {
            document.getElementById('expenseList').innerHTML = "<p style='text-align:center'>Error loading data.</p>";
        }
    }

    function toggleMonth(header) {
        const content = header.nextElementSibling;
        const arrow = header.querySelector('.arrow');
        const isActive = content.classList.toggle('active');
        arrow.classList.toggle('active-arrow', isActive);
    }

    function updateSettlement(erikPaid, nadinePaid) {
        const total = erikPaid + nadinePaid;
        const target = total / 2;
        const box = document.getElementById('settlementBox');
        let diff = erikPaid - target; 
        if (Math.abs(diff) < 0.01) {
            box.innerHTML = "Perfectly balanced! (50/50)";
        } else if (diff > 0) {
            box.innerHTML = `Nadine owes Erik: <b>$${diff.toFixed(2)}</b>`;
        } else {
            box.innerHTML = `Erik owes Nadine: <b>$${Math.abs(diff).toFixed(2)}</b>`;
        }
    }

    function edit(idx, date, paidBy, category, amount) {
        document.getElementById('editIndex').value = idx;
        document.getElementById('date').value = date.split('T')[0];
        document.getElementById('paidBy').value = paidBy;
        document.getElementById('category').value = category;
        document.getElementById('amount').value = amount;
        document.getElementById('submitBtn').innerText = "UPDATE";
        editMode = true;
        window.scrollTo(0,0);
    }

    async function del(idx) {
        if(!confirm("Confirm delete?")) return;
        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify({ action: 'delete', index: idx }) });
            await refresh();
        } catch(e) { console.error(e); }
    }

    document.getElementById('expenseForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const originalText = editMode ? "UPDATE" : "ADD";
        btn.innerText = "Busy...";
        btn.disabled = true;
        
        const action = editMode ? 'update' : 'add';
        const payload = {
            action: action,
            index: document.getElementById('editIndex').value,
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            category: document.getElementById('category').value,
            amount: document.getElementById('amount').value
        };

        try {
            await fetch(URL, { method: 'POST', body: JSON.stringify(payload)});
        } catch (err) { console.log("Save error."); } 
        finally {
            document.getElementById('expenseForm').reset();
            btn.innerText = "ADD";
            btn.disabled = false;
            editMode = false;
            document.getElementById('date').valueAsDate = new Date();
            await refresh();
        }
    };

    document.getElementById('date').valueAsDate = new Date();
    refresh();
</script>
</body>
</html>
