<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Expense Tracker</h1>
        <input id="amt" type="number" class="w-full p-2 border rounded mb-2" placeholder="Amount">
        <button onclick="debugSave()" class="w-full bg-blue-600 text-white p-3 rounded">Test Save</button>
    </div>

    <script>
        // 1. UPDATE THIS URL
        const URL = "https://script.google.com/macros/s/AKfycbxCc8PolPHdzPz3wXjxiFc2Gckp9pnFzIBez4NMJape-ZDPZFp_urzkhEaj3DOXkHZP/exec"; 

        async function debugSave() {
            // Check if URL is still the placeholder
            if (URL.includes("PASTE")) {
                alert("STOP! You did not update the URL in index.html!");
                return;
            }

            alert("Attempting to connect to: " + URL);

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'add', amount: document.getElementById('amt').value })
                });
                alert("Request sent! Check your Google Sheet.");
            } catch (error) {
                alert("Error happened: " + error.message);
            }
        }
    </script>
</body>
</html>
