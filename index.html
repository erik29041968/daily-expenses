<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expenses</title>
    <style>
      
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 20px; 
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://images.unsplash.com/photo-1505144808409-192770258160');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
        }
        .container { 
            max-width: 600px; margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 2.5rem; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        h2 { text-align: center; color: #004a6e; margin-bottom: 25px; }
        
        .stats-grid { display: flex; gap: 15px; margin-bottom: 30px; }
        .stat-box { flex: 1; padding: 15px; border-radius: 12px; text-align: center; background: #f0f7fa; border: 1px solid #d1e7ef; }
        .stat-val { display: block; font-size: 1.3rem; font-weight: bold; color: #004a6e; margin-top: 5px; }

        label { font-weight: 600; display: block; margin-top: 20px; font-size: 1rem; color: #444; }
        input, select { 
            width: 100%; padding: 18px; margin-top: 8px; border: 2px solid #ddd; 
            border-radius: 12px; box-sizing: border-box; font-size: 1.1rem;
        }
        button { 
            width: 100%; padding: 18px; margin-top: 20px; background-color: #0077be; 
            color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 12px; font-size: 1.1rem;
        }
        button:hover { background-color: #005f99; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        .edit-btn { background: #f39c12; padding: 8px 15px; font-size: 0.9rem; border-radius: 6px; cursor: pointer; border: none; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌊 Wild Ocean Expenses</h2>
    
    <div class="stats-grid">
        <div class="stat-box">Erik<span id="erikTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Nadine<span id="nadineTotal" class="stat-val">$0.00</span></div>
        <div class="stat-box">Balance<span id="balance" class="stat-val">$0.00</span></div>
    </div>
    
    <form id="expenseForm">
        <input type="hidden" id="editIndex" value="">
        <label>Date</label> <input type="date" id="date" required>
        <label>Who Paid?</label>
        <select id="paidBy"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <label>Amount ($)</label> <input type="number" id="amount" step="0.01" required>
        <label>Category</label>
        <select id="category">
            <option value="Groceries">Groceries</option><option value="Restaurant">Restaurant</option>
            <option value="Fuel">Fuel</option><option value="Gifts">Gifts</option>
        </select>
        <button type="submit" id="submitBtn">Save Expense</button>
        <button type="button" id="cancelBtn" style="display:none; background:#999;" onclick="resetForm()">Cancel</button>
    </form>

    <table>
        <thead><tr><th>Date</th><th>Who</th><th>$</th><th>Action</th></tr></thead>
        <tbody id="expenseTableBody"></tbody>
    </table>
</div>

<script>
    let expenses = []; // De data komt hierin

    const form = document.getElementById('expenseForm');
    
    // Form afhandeling
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const index = document.getElementById('editIndex').value;
        const newData = {
            date: document.getElementById('date').value,
            paidBy: document.getElementById('paidBy').value,
            amount: parseFloat(document.getElementById('amount').value),
            category: document.getElementById('category').value
        };

        if (index === "") {
            expenses.push(newData);
        } else {
            expenses[index] = newData;
        }

        renderTable();
        updateTotals();
        resetForm();
    });

    function updateTotals() {
        let erikT = 0, nadineT = 0;
        expenses.forEach(item => {
            if (item.paidBy === 'Erik') erikT += item.amount;
            else nadineT += item.amount;
        });
        document.getElementById('erikTotal').textContent = `$${erikT.toFixed(2)}`;
        document.getElementById('nadineTotal').textContent = `$${nadineT.toFixed(2)}`;
        document.getElementById('balance').textContent = `$${Math.abs(erikT - nadineT).toFixed(2)}`;
    }

    function renderTable() {
        const tbody = document.getElementById('expenseTableBody');
        tbody.innerHTML = '';
        expenses.forEach((item, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.paidBy}</td>
                    <td>$${item.amount.toFixed(2)}</td>
                    <td><button class="edit-btn" onclick="editExpense(${index})">Edit</button></td>
                </tr>
            `;
        });
    }

    function editExpense(index) {
        const item = expenses[index];
        document.getElementById('date').value = item.date;
        document.getElementById('paidBy').value = item.paidBy;
        document.getElementById('amount').value = item.amount;
        document.getElementById('category').value = item.category;
        document.getElementById('editIndex').value = index;
        document.getElementById('submitBtn').textContent = "Update Expense";
        document.getElementById('cancelBtn').style.display = "block";
    }

    function resetForm() {
        form.reset();
        document.getElementById('editIndex').value = "";
        document.getElementById('submitBtn').textContent = "Save Expense";
        document.getElementById('cancelBtn').style.display = "none";
    }
</script>
</body>
</html>
